services:
  minio:
    image: quay.io/minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:?set MINIO_ROOT_USER}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD}"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 30
    restart: unless-stopped

  create-bucket:
    image: quay.io/minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "mc alias set local http://minio:9000 \"$${MINIO_ROOT_USER}\" \"$${MINIO_ROOT_PASSWORD}\" &&
      mc mb --ignore-existing local/$${CHUNKGATE_S3_BUCKET}"
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:?set MINIO_ROOT_USER}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD}"
      CHUNKGATE_S3_BUCKET: "${CHUNKGATE_S3_BUCKET:-chunkgate-blocks}"
    restart: "no"

  chunkgate:
    image: "ghcr.io/badgerbees/chunkgate:${CHUNKGATE_IMAGE_TAG:-latest}"
    depends_on:
      create-bucket:
        condition: service_completed_successfully
    ports:
      - "${CHUNKGATE_HTTP_PORT:-8080}:8080"
    environment:
      CHUNKGATE_LISTEN: ":8080"
      CHUNKGATE_DATA_DIR: "/data"
      CHUNKGATE_METADATA: "sqlite"
      CHUNKGATE_BACKEND: "s3"
      CHUNKGATE_ACCESS_KEY_ID: "${CHUNKGATE_ACCESS_KEY_ID:?set CHUNKGATE_ACCESS_KEY_ID}"
      CHUNKGATE_SECRET_ACCESS_KEY: "${CHUNKGATE_SECRET_ACCESS_KEY:?set CHUNKGATE_SECRET_ACCESS_KEY}"
      CHUNKGATE_TENANT_ID: "${CHUNKGATE_TENANT_ID:-default}"
      CHUNKGATE_LOCAL_CAPACITY_BYTES: "${CHUNKGATE_LOCAL_CAPACITY_BYTES:-21474836480}"
      CHUNKGATE_SCRATCH_MIN_FREE_BYTES: "${CHUNKGATE_SCRATCH_MIN_FREE_BYTES:-1073741824}"
      CHUNKGATE_S3_ENDPOINT: "minio:9000"
      CHUNKGATE_S3_REGION: "${CHUNKGATE_S3_REGION:-us-east-1}"
      CHUNKGATE_S3_BUCKET: "${CHUNKGATE_S3_BUCKET:-chunkgate-blocks}"
      CHUNKGATE_S3_ACCESS_KEY_ID: "${MINIO_ROOT_USER:?set MINIO_ROOT_USER}"
      CHUNKGATE_S3_SECRET_ACCESS_KEY: "${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD}"
      CHUNKGATE_S3_PATH_STYLE: "true"
      CHUNKGATE_S3_USE_TLS: "false"
      CHUNKGATE_GC_ENABLED: "true"
      CHUNKGATE_GC_MIN_ORPHAN_AGE_SECONDS: "${CHUNKGATE_GC_MIN_ORPHAN_AGE_SECONDS:-86400}"
    volumes:
      - chunkgate-data:/data
    read_only: false
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  chunkgate-data:
  minio-data:
