apiVersion: v1
kind: Namespace
metadata:
  name: chunkgate
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: chunkgate-config
  namespace: chunkgate
data:
  CHUNKGATE_LISTEN: ":8080"
  CHUNKGATE_DATA_DIR: "/data"
  CHUNKGATE_METADATA: "sqlite"
  CHUNKGATE_BACKEND: "s3"
  CHUNKGATE_LOCAL_CAPACITY_BYTES: "21474836480"
  CHUNKGATE_SCRATCH_MIN_FREE_BYTES: "1073741824"
  CHUNKGATE_S3_ENDPOINT: "minio.minio.svc.cluster.local:9000"
  CHUNKGATE_S3_REGION: "us-east-1"
  CHUNKGATE_S3_BUCKET: "chunkgate-blocks"
  CHUNKGATE_S3_PATH_STYLE: "true"
  CHUNKGATE_S3_USE_TLS: "false"
  CHUNKGATE_GC_ENABLED: "true"
  CHUNKGATE_GC_INTERVAL_SECONDS: "3600"
  CHUNKGATE_GC_MIN_ORPHAN_AGE_SECONDS: "86400"
  CHUNKGATE_READINESS_TIMEOUT_SECONDS: "3"
  CHUNKGATE_SHUTDOWN_TIMEOUT_SECONDS: "15"
---
apiVersion: v1
kind: Secret
metadata:
  name: chunkgate-secrets
  namespace: chunkgate
type: Opaque
stringData:
  CHUNKGATE_ACCESS_KEY_ID: "replace-me-client-access-key"
  CHUNKGATE_SECRET_ACCESS_KEY: "replace-me-client-secret-key"
  CHUNKGATE_TENANT_ID: "default"
  CHUNKGATE_S3_ACCESS_KEY_ID: "replace-me-backend-access-key"
  CHUNKGATE_S3_SECRET_ACCESS_KEY: "replace-me-backend-secret-key"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: chunkgate-data
  namespace: chunkgate
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chunkgate
  namespace: chunkgate
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: chunkgate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: chunkgate
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: chunkgate
          image: ghcr.io/badgerbees/chunkgate:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: chunkgate-config
            - secretRef:
                name: chunkgate-secrets
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "4"
              memory: 4Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: chunkgate-data
---
apiVersion: v1
kind: Service
metadata:
  name: chunkgate
  namespace: chunkgate
spec:
  selector:
    app.kubernetes.io/name: chunkgate
  ports:
    - name: http
      port: 8080
      targetPort: http
  type: ClusterIP
