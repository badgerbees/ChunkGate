services:
  minio:
    image: quay.io/minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: "minioadmin"
      MINIO_ROOT_PASSWORD: "minioadmin"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/ready"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    profiles: ["postgres"]
    ports:
      - "15432:5432"
    environment:
      POSTGRES_USER: "chunkgate"
      POSTGRES_PASSWORD: "chunkgate"
      POSTGRES_DB: "chunkgate"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chunkgate -d chunkgate"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  create-bucket:
    image: quay.io/minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/chunkgate"

  chunkgate:
    build: .
    image: chunkgate:local
    ports:
      - "8080:8080"
    depends_on:
      create-bucket:
        condition: service_completed_successfully
    environment:
      CHUNKGATE_LISTEN: ":8080"
      CHUNKGATE_DATA_DIR: "/data"
      CHUNKGATE_LOCAL_CAPACITY_BYTES: "21474836480"
      CHUNKGATE_ACCESS_KEY_ID: "chunkgate"
      CHUNKGATE_SECRET_ACCESS_KEY: "chunkgate-secret"
      CHUNKGATE_TENANT_ID: "default"
      CHUNKGATE_BACKEND: "s3"
      CHUNKGATE_S3_ENDPOINT: "minio:9000"
      CHUNKGATE_S3_REGION: "us-east-1"
      CHUNKGATE_S3_BUCKET: "chunkgate"
      CHUNKGATE_S3_ACCESS_KEY_ID: "minioadmin"
      CHUNKGATE_S3_SECRET_ACCESS_KEY: "minioadmin"
      CHUNKGATE_S3_PATH_STYLE: "true"
      CHUNKGATE_S3_USE_TLS: "false"
    volumes:
      - chunkgate-data:/data
    restart: unless-stopped

volumes:
  chunkgate-data:
  minio-data:
  postgres-data:
