name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: chunkgate
          POSTGRES_PASSWORD: chunkgate
          POSTGRES_DB: chunkgate
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U chunkgate -d chunkgate"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.9"
          cache: true
      - name: Start MinIO
        run: |
          docker run -d --name chunkgate-minio \
            -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            quay.io/minio/minio:latest server /data
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:9000/minio/health/ready; then
              exit 0
            fi
            sleep 1
          done
          docker logs chunkgate-minio
          exit 1
      - run: go test ./...
        env:
          CHUNKGATE_S3_TEST_ENDPOINT: http://localhost:9000
          CHUNKGATE_S3_TEST_BUCKET: chunkgate-test
          CHUNKGATE_S3_TEST_ACCESS_KEY_ID: minioadmin
          CHUNKGATE_S3_TEST_SECRET_ACCESS_KEY: minioadmin
          CHUNKGATE_POSTGRES_TEST_DSN: postgres://chunkgate:chunkgate@localhost:5432/chunkgate?sslmode=disable
      - run: go vet ./...
      - run: go build -o /tmp/chunkgate ./cmd/chunkgate
      - run: go build -o /tmp/chunkgate-delta ./cmd/chunkgate-delta

  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.9"
          cache: true
      - name: Go vulnerability scan
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          "$(go env GOPATH)/bin/govulncheck" ./...
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom.cdx.json
      - uses: actions/upload-artifact@v4
        with:
          name: chunkgate-sbom
          path: sbom.cdx.json
      - name: Filesystem vulnerability scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
