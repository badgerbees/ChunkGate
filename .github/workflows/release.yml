name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.11"
          cache: true
      - name: Build release archives
        env:
          CGO_ENABLED: "0"
        run: |
          set -eu
          mkdir -p dist
          version="${GITHUB_REF_NAME:-snapshot}"
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64 windows/arm64; do
            os="${target%/*}"
            arch="${target#*/}"
            outdir="dist/chunkgate_${version}_${os}_${arch}"
            mkdir -p "$outdir"
            ext=""
            if [ "$os" = "windows" ]; then
              ext=".exe"
            fi
            GOOS="$os" GOARCH="$arch" go build -trimpath -ldflags="-s -w" -o "$outdir/chunkgate$ext" ./cmd/chunkgate
            GOOS="$os" GOARCH="$arch" go build -trimpath -ldflags="-s -w" -o "$outdir/chunkgate-delta$ext" ./cmd/chunkgate-delta
            cp README.md "$outdir/"
            cp docs/delta-protocol.md "$outdir/"
            if [ "$os" = "windows" ]; then
              python3 -m zipfile -c "$outdir.zip" "$outdir"/*
            else
              tar -czf "$outdir.tar.gz" -C dist "$(basename "$outdir")"
            fi
            rm -rf "$outdir"
          done
      - name: Generate source SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: dist/sbom.cdx.json
      - name: Generate checksums
        run: |
          set -eu
          (cd dist && sha256sum *.tar.gz *.zip sbom.cdx.json > checksums.txt)
      - name: Login to GHCR
        if: startsWith(github.ref, 'refs/tags/')
        run: echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Publish container image
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          set -eu
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          image="ghcr.io/${owner}/chunkgate"
          docker build -t "${image}:${GITHUB_REF_NAME}" -t "${image}:latest" .
          docker push "${image}:${GITHUB_REF_NAME}"
          docker push "${image}:latest"
      - uses: actions/upload-artifact@v4
        with:
          name: chunkgate-release-dist
          path: dist/*
      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
